apiVersion: apps/v1
kind: Deployment
metadata:
  name: hct-frontend-deployment
  namespace: hct-alquiler-vehiculos
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hct-frontend
  template:
    metadata:
      labels:
        app: hct-frontend
    spec:
      containers:
        - name: hct-frontend
          image: victortorreblancafranco/hct-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          envFrom:
            - secretRef:
                name: hct-frontend-secret

