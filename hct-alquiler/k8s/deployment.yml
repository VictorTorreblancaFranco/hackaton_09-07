apiVersion: apps/v1
kind: Deployment
metadata:
  name: hct-alquiler-deployment
  namespace: hct-alquiler-vehiculos
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hct-alquiler
  template:
    metadata:
      labels:
        app: hct-alquiler
    spec:
      containers:
        - name: hct-alquiler
          image: hct-alquiler:local
          imagePullPolicy: Never
          ports:
            - containerPort: 8083
          envFrom:
            - secretRef:
                name: hct-alquiler-secret
